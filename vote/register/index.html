<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Kompetisi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4 antialiased font-sans">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        
        <div class="text-center mb-6">
            <h2 class="text-3xl font-extrabold text-red-500 tracking-wide">Form Pendaftaran</h2>
            <p class="text-gray-400 text-xs mt-1 leading-relaxed">Isi data dirimu dengan benar untuk mengikuti kompetisi</p>
        </div>

        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5 pl-0.5">Nama Lengkap</label>
                <input type="text" id="reg-nama" required class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-white text-sm focus:outline-none focus:border-red-500 transition-colors">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5 pl-0.5">Asal Sekolah</label>
                <input type="text" id="reg-sekolah" required class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-white text-sm focus:outline-none focus:border-red-500 transition-colors">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5 pl-0.5">Nomor HP / WhatsApp</label>
                <input type="tel" id="reg-nohp" placeholder="08xxxxxxxxx" required class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-white text-sm font-mono focus:outline-none focus:border-red-500 transition-colors">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5 pl-0.5">Email</label>
                <input type="email" id="reg-email" required class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-white text-sm focus:outline-none focus:border-red-500 transition-colors">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5 pl-0.5">Username Instagram</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400 text-sm">@</span>
                    <input type="text" id="reg-ig" placeholder="username" required class="w-full bg-gray-700 border border-gray-600 rounded-xl pl-8 pr-4 py-2 text-white text-sm focus:outline-none focus:border-red-500 transition-colors">
                </div>
            </div>

            <!-- KOMPONEN BARU: INPUT SET GENDER KOMPETISI -->
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5 pl-0.5">Kategori Gender</label>
                <select id="reg-gender" required class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-white text-sm focus:outline-none focus:border-red-500 transition-colors cursor-pointer appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%239CA3AF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E')] bg-[length:12px_12px] bg-[right_1rem_center] bg-no-repeat">
                    <option value="" disabled selected class="text-gray-400">-- Pilih Kategori --</option>
                    <option value="COWO" class="bg-gray-800 text-white">PUTRA (COWO)</option>
                    <option value="CEWE" class="bg-gray-800 text-white">PUTRI (CEWE)</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5 pl-0.5">Upload Foto 3x4 (JPG/JPEG)</label>
                <input type="file" id="reg-foto" accept=".jpg, .jpeg" required class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-xs text-gray-400 file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-[10px] file:font-black file:uppercase file:tracking-wider file:bg-red-600 file:text-white hover:file:bg-red-700 file:cursor-pointer file:transition-colors">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1.5 pl-0.5">Link Video Instagram/TikTok</label>
                <input type="url" id="reg-video" placeholder="https://instagram.com/p/..." required class="w-full bg-gray-700 border border-gray-600 rounded-xl px-4 py-2 text-white text-sm focus:outline-none focus:border-red-500 transition-colors">
            </div>

            <div class="pt-2 space-y-3 text-center">
                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-black text-xs uppercase tracking-widest py-3 px-4 rounded-xl transition duration-200 shadow-lg cursor-pointer">
                    Daftar & Download Bukti
                </button>
                
                <div class="pt-1">
                    <a href="../edit/index.html" class="inline-flex items-center gap-1.5 text-[11px] font-bold text-gray-400 hover:text-red-400 uppercase tracking-wider transition-colors duration-150">
                        <i class="fas fa-question-circle text-xs"></i> Edit? <span class="text-red-500 underline underline-offset-2">Klik Sini</span>
                    </a>
                </div>
            </div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../vote.js"></script>
</body>
</html>
