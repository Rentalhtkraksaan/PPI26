<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papan Peringkat Kompetisi</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Efek Surprise 1: Animasi Kebangkitan Kartu */
        @keyframes epicPop {
            0% { transform: scale(0.92) translateY(10px); opacity: 0; filter: blur(5px); }
            100% { transform: scale(1) translateY(0); opacity: 1; filter: blur(0); }
        }
        
        /* Efek Surprise 2: Aura Cahaya Berputar Di Belakang Kartu */
        @keyframes neonGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.2), 0 0 40px rgba(234, 179, 8, 0.1); }
            50% { box-shadow: 0 0 35px rgba(239, 68, 68, 0.5), 0 0 70px rgba(234, 179, 8, 0.3); }
        }

        .celeb-popup { 
            animation: epicPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, neonGlow 3s ease-in-out infinite; 
        }

        /* Partikel Efek Kejutan */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white min-h-screen p-4 md:p-8 flex items-center justify-center antialiased font-sans overflow-x-hidden relative">

    <div id="particle-container" class="absolute inset-0 pointer-events-none overflow-hidden z-40"></div>

    <div class="w-full max-w-md md:max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8 items-stretch justify-center z-10">
        
        <div class="flex flex-col gap-5 justify-center">
            
            <div class="flex justify-start">
                <a href="https://ppikabupatenprobolinggo.vercel.app/" id="back-to-vercel-btn" class="bg-gray-800/80 hover:bg-red-600 border border-gray-700 hover:border-red-500 text-[11px] uppercase tracking-widest font-black px-5 py-3 rounded-xl transition-all duration-300 flex items-center gap-2 cursor-pointer text-gray-300 shadow-lg backdrop-blur-md decoration-none">
                    <i class="fas fa-arrow-left text-white animate-pulse"></i> Kembali
                </a>
            </div>

            <div id="countdown-section" class="bg-gradient-to-br from-red-950/30 via-gray-900/80 to-gray-900/30 p-6 rounded-2xl border border-red-500/20 text-center shadow-2xl backdrop-blur-md relative overflow-hidden">
                <div class="absolute -top-10 -left-10 w-24 h-24 bg-red-500/10 rounded-full blur-2xl"></div>
                <h3 class="text-[10px] font-black text-red-400 tracking-widest uppercase mb-4">PENGUMUMAN THE WINNER</h3>
                <div class="grid grid-cols-4 gap-2.5">
                    <div class="bg-gray-950/80 p-3 rounded-xl border border-gray-800/80 text-center shadow-inner"><span id="days" class="text-xl md:text-3xl font-black block font-mono text-white tracking-tight">00</span><span class="text-[8px] text-gray-500 uppercase tracking-widest font-black block mt-0.5">Hari</span></div>
                    <div class="bg-gray-950/80 p-3 rounded-xl border border-gray-800/80 text-center shadow-inner"><span id="hours" class="text-xl md:text-3xl font-black block font-mono text-white tracking-tight">00</span><span class="text-[8px] text-gray-500 uppercase tracking-widest font-black block mt-0.5">Jam</span></div>
                    <div class="bg-gray-950/80 p-3 rounded-xl border border-gray-800/80 text-center shadow-inner"><span id="minutes" class="text-xl md:text-3xl font-black block font-mono text-white tracking-tight">00</span><span class="text-[8px] text-gray-500 uppercase tracking-widest font-black block mt-0.5">Menit</span></div>
                    <div class="bg-gray-950/80 p-3 rounded-xl border border-gray-800/80 text-center shadow-inner"><span id="seconds" class="text-xl md:text-3xl font-black block font-mono text-white tracking-tight text-red-500 animate-pulse">00</span><span class="text-[8px] text-gray-500 uppercase tracking-widest font-black block mt-0.5">Detik</span></div>
                </div>
            </div>

            <div id="dropdown-container" class="bg-gray-800/60 p-6 rounded-2xl border border-gray-700/70 shadow-xl backdrop-blur-md relative">
                <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2.5 pl-0.5">FILTER KATEGORI JAWARA</label>
                <div class="relative">
                    <select id="view-dropdown-kategori" class="w-full bg-gray-700 border border-gray-600 rounded-xl pl-4 pr-10 py-3 text-white text-sm focus:outline-none focus:border-red-500 transition-colors cursor-pointer appearance-none">
                        <option value="">-- PILIH KATEGORI JUARA --</option>
                        
                        <optgroup label="KATEGORI PUTRA" class="bg-gray-800 text-gray-300 font-bold">
                            <option value="top_view_cowo" class="bg-gray-800 text-white font-normal">Top Views Putra</option>
                            <option value="top_like_cowo" class="bg-gray-800 text-white font-normal">Top Likes Putra</option>
                            <option value="top_komen_cowo" class="bg-gray-800 text-white font-normal">Top Komen Putra</option>
                            <option value="top_share_cowo" class="bg-gray-800 text-white font-normal">Top Share Putra</option>
                            <option value="top_repost_cowo" class="bg-gray-800 text-white font-normal">Top Repost Putra</option>
                        </optgroup>

                        <optgroup label="KATEGORI PUTRI" class="bg-gray-800 text-gray-300 font-bold">
                            <option value="top_view_cewe" class="bg-gray-800 text-white font-normal">Top Views Putri</option>
                            <option value="top_like_cewe" class="bg-gray-800 text-white font-normal">Top Likes Putri</option>
                            <option value="top_komen_cewe" class="bg-gray-800 text-white font-normal">Top Komen Putri</option>
                            <option value="top_share_cewe" class="bg-gray-800 text-white font-normal">Top Share Putri</option>
                            <option value="top_repost_cewe" class="bg-gray-800 text-white font-normal">Top Repost Putri</option>
                        </optgroup>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </div>
                </div>
            </div>
        </div>

        <div id="leaderboard-display" class="min-h-[400px] md:min-h-full flex items-center justify-center bg-gray-950/30 border border-gray-800/50 rounded-3xl p-6 shadow-inner text-center relative backdrop-blur-sm">
            <div class="space-y-3 max-w-xs animate-pulse">
                <div class="w-16 h-16 bg-gray-800/50 rounded-full flex items-center justify-center mx-auto border border-gray-700">
                    <i class="fas fa-trophy text-gray-600 text-xl"></i>
                </div>
                <p class="text-gray-500 text-xs font-black tracking-widest uppercase leading-relaxed">Menunggu Pemilihan Kategori...</p>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="../vote.js"></script>
</body>
</html>
